<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>手机端扫码识别</title>
  <style>
    #video { width: 100%; max-width: 640px; border: 1px solid #ccc; }
    table { border-collapse: collapse; width: 100%; max-width: 640px; margin-top:8px;}
    td, th { border: 1px solid #ddd; padding: 6px; }
	
	body { font-family: Arial, sans-serif; margin: 0; padding: 0; }
	#video { width: 100%; height: auto; border: 1px solid #ccc; }
	#controls { display: flex; flex-wrap: wrap; gap: 8px; margin: 8px; }
	button { flex: 1; min-width: 100px; padding: 10px; font-size: 16px; }
	table { width: 100%; font-size: 14px; }

	  #overlay {
  		position: absolute;
  		top: 0; left: 0;
  		width: 100%; height: 100%;
  		pointer-events: none;
		}
	#scanArea {
  		position: absolute;
  		top: 50%; left: 50%;
  		width: 300px; height: 300px;
  		margin-left: -150px; margin-top: -150px;
  		border: 2px solid red;
  		box-shadow: 0 0 20px rgba(255,0,0,0.5);
	}
  </style>
</head>
<body>
  <h3>手机端扫码（后置摄像头优化）</h3>
	<!--添加一个扫描框-->
	<div id="overlay">
  		<div id="scanArea"></div>
	</div>
	
  <video id="video" autoplay muted playsinline></video>
  <div>
    <button id="startBtn">开始</button>
    <button id="stopBtn">停止</button>
    <button id="toggleModeBtn">切换提示模式（当前：蜂鸣）</button>
  </div>
  <table id="resultsTable">
    <thead><tr><th>时间</th><th>类型</th><th>内容</th></tr></thead>
    <tbody></tbody>
  </table>

  <script src="https://cdn.jsdelivr.net/npm/@zxing/library@0.19.1/umd/index.min.js"></script>
  <script>
    const videoElem = document.getElementById('video');
    const tbody = document.querySelector('#resultsTable tbody');
    let codeReader = null, stream = null;
    const seen = new Set();

    // 模式： "beep" 或 "voice"
    let repeatMode = "beep";

    // 正常提示音
    function beep() {
      const ctx = new (window.AudioContext || window.webkitAudioContext)();
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.type = "sine";
      osc.frequency.value = 1000;
      gain.gain.value = 0.2;
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.start();
      osc.stop(ctx.currentTime + 0.15);
    }

    // 错误提示音
    function errorBeep() {
      const ctx = new (window.AudioContext || window.webkitAudioContext)();
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.type = "square";
      osc.frequency.value = 400;
      gain.gain.value = 0.3;
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.start();
      osc.stop(ctx.currentTime + 0.4);
    }

    // 语音提示
    function speakMessage(msg) {
      const utter = new SpeechSynthesisUtterance(msg);
      utter.lang = "zh-CN";
      utter.rate = 1.2;
      speechSynthesis.speak(utter);
    }

    function handleResult(text, format) {
      const key = format + "|" + text;
      if (seen.has(key)) {
        // 重复识别：不写表格，只提示
        if (repeatMode === "beep") {
          errorBeep();
        } else {
          speakMessage("重复码");
        }
        return;
      }
      seen.add(key);

      // 第一次识别：写入表格 + 正常提示音
      const tr = document.createElement('tr');
      tr.innerHTML = `<td>${new Date().toLocaleString()}</td><td>${format}</td><td>${text}</td>`;
      tbody.prepend(tr);

      beep();
      console.log("识别到:", format, text);
    }

    async function startScanner() {
      stream = await navigator.mediaDevices.getUserMedia({
        video: {
          width: { ideal: 1920 },
          height: { ideal: 1080 },
          facingMode: { exact: "environment" } // 强制后置摄像头
        }
      });
      videoElem.srcObject = stream;

      const hints = new Map();
      hints.set(ZXing.DecodeHintType.POSSIBLE_FORMATS, [
        ZXing.BarcodeFormat.QR_CODE,
        ZXing.BarcodeFormat.CODE_128,
        ZXing.BarcodeFormat.EAN_13,
        ZXing.BarcodeFormat.EAN_8,
        ZXing.BarcodeFormat.UPC_A,
        ZXing.BarcodeFormat.UPC_E
      ]);
      hints.set(ZXing.DecodeHintType.TRY_HARDER, true);

      codeReader = new ZXing.BrowserMultiFormatReader(hints);
		/*这段被更换为只扫描300*300区域内
      codeReader.decodeFromVideoDevice(null, videoElem, (result, err) => {
        if (result) {
          handleResult(result.getText(), result.getBarcodeFormat());
        } else if (err && !(err.name === "NotFoundException")) {
          console.error("解码错误:", err);
        }
      });
	  */
		//只扫描300*300区域内
		codeReader.decodeFromVideoDevice(null, videoElem, (result, err, controls) => {
  if (videoElem.readyState === videoElem.HAVE_ENOUGH_DATA) {
    const canvas = document.createElement('canvas');
    const ctx = canvas.getContext('2d');
    const { videoWidth, videoHeight } = videoElem;

    // 扫描框区域坐标
    const boxSize = 300;
    const x = (videoWidth - boxSize) / 2;
    const y = (videoHeight - boxSize) / 2;

    canvas.width = boxSize;
    canvas.height = boxSize;
    ctx.drawImage(videoElem, x, y, boxSize, boxSize, 0, 0, boxSize, boxSize);

    // 只传递框区域给 ZXing
    try {
      const luminanceSource = new ZXing.HTMLCanvasElementLuminanceSource(canvas);
      const binaryBitmap = new ZXing.BinaryBitmap(new ZXing.HybridBinarizer(luminanceSource));
      const result = codeReader.decode(binaryBitmap);
      if (result) {
        handleResult(result.getText(), result.getBarcodeFormat());
      }
    } catch (e) {
      // 没识别到就忽略
    }
  }
});
		//上面为修改后
    }

    function stopScanner() {
      if (codeReader) { codeReader.reset(); codeReader = null; }
      if (stream) { stream.getTracks().forEach(t => t.stop()); stream = null; }
      videoElem.srcObject = null;
    }

    document.getElementById('startBtn').onclick = startScanner;
    document.getElementById('stopBtn').onclick = stopScanner;
    document.getElementById('toggleModeBtn').onclick = () => {
      repeatMode = repeatMode === "beep" ? "voice" : "beep";
      document.getElementById('toggleModeBtn').innerText =
        `切换提示模式（当前：${repeatMode === "beep" ? "蜂鸣" : "语音"}）`;
    };
  </script>
</body>
</html>
